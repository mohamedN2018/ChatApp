{% autoescape on %}<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:32px 0;">
    <tr><td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;">
        <tr><td style="padding:32px 32px 8px;">
          <h1 style="margin:0;font-size:20px;color:#111827;">Reset your password</h1>
        </td></tr>
        <tr><td style="padding:8px 32px;color:#374151;font-size:15px;line-height:1.6;">
          <p style="margin:0 0 16px;">Hi {{ name }},</p>
          <p style="margin:0 0 16px;">We received a request to reset your <strong>{{ app_name }}</strong> password.</p>
        </td></tr>
        <tr><td align="center" style="padding:8px 32px 24px;">
          <a href="{{ action_url }}" style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;padding:12px 28px;border-radius:10px;font-weight:600;font-size:15px;">Reset password</a>
        </td></tr>
        <tr><td style="padding:0 32px 28px;color:#6b7280;font-size:13px;line-height:1.6;">
          <p style="margin:0 0 8px;">This link expires in {{ expires_hours }} hour(s).</p>
          <p style="margin:0;">If you didn't request this, ignore this email — your password won't change.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>{% endautoescape %}
