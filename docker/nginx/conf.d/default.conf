# Reverse proxy for the ChatApp backend.
# TLS termination is expected at this layer in production; mount certs and add a
# 443 server block + redirect. This baseline serves HTTP for the proxy network.

upstream chatapp_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Collected static files served directly by nginx (shared volume).
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket endpoints (Channels consumers live under /ws/).
    location /ws/ {
        proxy_pass http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # long-lived connections
        proxy_send_timeout 3600s;
    }

    # Everything else -> Django/DRF (ASGI HTTP).
    location / {
        proxy_pass http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
